# Render blueprint for the Aurora backend (free web service).
# Connect this repo in Render → it reads this file. Set the `sync: false`
# secrets in the dashboard (DATABASE_URL from Neon, JWT secrets, CORS, OLYMPUS_URL).
services:
  - type: web
    name: aurora-api
    runtime: node
    plan: free
    rootDir: server
    buildCommand: npm install && npm run build
    startCommand: npx prisma db push && node dist/main
    healthCheckPath: /api/health
    envVars:
      - key: NODE_ENV
        value: production
      - key: COOKIE_SAMESITE
        value: none
      - key: COOKIE_SECURE
        value: "true"
      - key: JWT_ACCESS_TTL
        value: "900"
      - key: JWT_REFRESH_TTL
        value: "2592000"
      - key: SIGNUP_BONUS
        value: "0"
      - key: DATABASE_URL
        sync: false
      - key: JWT_ACCESS_SECRET
        sync: false
      - key: JWT_REFRESH_SECRET
        sync: false
      - key: CORS_ORIGINS
        sync: false
      - key: OLYMPUS_URL
        sync: false
